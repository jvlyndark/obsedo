apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'obsedo'
        static_configs:
          - targets: ['obsedo-app:80']
        metrics_path: /metrics

app:
  image:
    repository: obsedo-app
    tag: latest
    pullPolicy: Never
  replicaCount: 1
  service:
    type: NodePort
    port: 80
    targetPort: 5000
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  config:
    flaskApp: "run.py"
    flaskEnv: "production"

postgres:
  image:
    repository: postgres
    tag: "15"
  user: postgres
  password: postgres
  database: obsedo_dev
  storage: 1Gi
  storageClassName: standard
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

secret:
  secretKey: "defaultsecret"
